<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deoria Properties | CEO: Chandan Dwivedi</title>
    <!-- Social Icons ke liye link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f9; color: #333; }
        header { background: #0b1a2f; color: #d4af37; padding: 30px; text-align: center; }
        
        /* Logo Styling */
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; margin-bottom: 10px; }
        
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        /* Social Section */
        .social-links { text-align: center; margin: 20px 0; }
        .social-links a { margin: 0 15px; font-size: 24px; color: #0b1a2f; text-decoration: none; }

        /* Upload Section (Instagram Style) */
        .upload-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 40px; border-left: 5px solid #d4af37; }
        .upload-section h2 { margin-bottom: 15px; color: #0b1a2f; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-upload { background: #0b1a2f; color: #d4af37; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        footer { text-align: center; padding: 20px; background: #0b1a2f; color: #d4af37; }
    </style>
</head>
<body>

    <header>
        <!-- Yahan aapka Logo add kiya gaya hai -->
        <img src="96360.jpg" alt="Devriya Properties Logo" class="logo">
        <h1>DEORIA PROPERTIES</h1>
        <p>CEO: Chandan Dwivedi</p>
    </header>

    <div class="container">
        <!-- Social Media Icons -->
        <div class="social-links">
            <a href="https://www.facebook.com/share/1H4HcG3MFw/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/deoria_property_1?utm_source=qr" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/916307104994" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>

        <!-- Property Upload (Instagram Style) -->
        <div class="upload-section">
            <h2>Post New Property</h2>
            <form>
                <input type="text" placeholder="Property Title (e.g. Luxury Villa in Deoria)" required>
                <input type="file" accept="image/*, video/*">
                <textarea rows="4" placeholder="Write property details like a caption..."></textarea>
                <button type="button" class="btn-upload">Post Property</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Deoria Properties. Managed by Chandan Dwivedi.</p>
    </footer>

</body>
</html>
